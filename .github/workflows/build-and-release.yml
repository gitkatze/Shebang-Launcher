name: Build SheBang

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Shebang/Shebang.csproj --runtime win-x64

      - name: Build
        run: dotnet build Shebang/Shebang.csproj --configuration Release --no-restore

      - name: Publish Windows executable
        run: >-
          dotnet publish Shebang/Shebang.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          --no-restore
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SheBang-win-x64
          path: publish/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download published executable
        uses: actions/download-artifact@v4
        with:
          name: SheBang-win-x64
          path: release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "${{ github.ref_name }}"
          ./release/Shebang.exe
          --title "SheBang ${{ github.ref_name }}"
          --notes $'初回リリースです。\n\n- Windows x64 向け自己完結型 Shebang.exe\n- Shebang（#!）、/usr/bin/env、env -S に対応\n- Shebang がないファイルは設定されたエディタで起動\n- .NET 10 対応'
